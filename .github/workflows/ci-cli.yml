name: CI CLI

on:
  push:
    branches: [main]
    paths:
      - "ntrp-ui/**"
  pull_request:
    branches: [main]
    paths:
      - "ntrp-ui/**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ntrp-ui/package.json

      - name: Install dependencies
        working-directory: ntrp-ui
        run: bun install --frozen-lockfile

      - name: Build
        working-directory: ntrp-ui
        run: bun run build
