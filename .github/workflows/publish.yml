name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.check.outputs.backend }}
      cli: ${{ steps.check.outputs.cli }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: check
        run: |
          prev_tag=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p')
          base=${prev_tag:-$(git rev-list --max-parents=0 HEAD)}
          files=$(git diff --name-only "$base" HEAD)
          echo "$files" | grep -qE '^(ntrp/|pyproject\.toml|uv\.lock)' && echo "backend=true" >> "$GITHUB_OUTPUT" || true
          echo "$files" | grep -qE '^ntrp-ui/' && echo "cli=true" >> "$GITHUB_OUTPUT" || true

  backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/publish-backend.yml

  cli:
    needs: changes
    if: needs.changes.outputs.cli == 'true'
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/publish-cli.yml
